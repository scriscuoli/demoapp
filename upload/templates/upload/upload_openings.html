{% extends "base.html" %}
{% block content %}
<h5>Openings</h5>
<ul>
{% for o in openings %}
    <li><a target="_blank" href="/static/images/openings/{{ o }}">{{ o }}</a></li>
{% endfor %}
</ul>
<form action="/DemoApp/upload/handleOpenings" method="post" class="dropzone" id="myOpeningDropzone"
        enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
</form>

{% endblock %}
